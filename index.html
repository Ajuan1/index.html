<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Simulador CACES EHEP</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{font-family:'Inter',sans-serif}
.hidden{display:none}
</style>

</head>

<body class="bg-gray-50 text-gray-800">

<header class="bg-white shadow p-4">
<div class="max-w-4xl mx-auto flex justify-between">

<h1 class="font-bold text-blue-800">
Simulador CACES
</h1>

<!-- BOTÓN ADMIN OCULTO -->
<button onclick="adminLogin()" class="text-xs text-gray-400 hover:text-blue-600">
Admin
</button>

</div>
</header>


<main class="max-w-2xl mx-auto p-6">

<!-- LANDING -->

<section id="landing">

<div class="bg-blue-600 text-white rounded-2xl p-8 text-center shadow-lg">

<h2 class="text-3xl font-bold mb-4">
¿Estás listo para el CACES?
</h2>

<p class="mb-6">
Simula tu nota real hoy y descubre si estás listo para aprobar el examen.
</p>

<button onclick="showView('student')" class="bg-white text-blue-600 px-6 py-3 rounded-full font-bold">
Empezar Simulacro
</button>

</div>

</section>


<!-- FORMULARIO ESTUDIANTE -->

<section id="student" class="hidden">

<h2 class="text-xl font-bold mb-6 text-center">
Datos del estudiante
</h2>

<div class="space-y-4">

<input id="nombre" placeholder="Nombre"
class="w-full border p-3 rounded">

<input id="apellido" placeholder="Apellido"
class="w-full border p-3 rounded">

<button onclick="goCareer()" class="w-full bg-blue-600 text-white py-3 rounded">
Continuar
</button>

</div>

</section>


<!-- CARRERA -->

<section id="career" class="hidden">

<h2 class="text-xl font-bold mb-6 text-center">
Selecciona tu carrera
</h2>

<div class="grid gap-4">

<button onclick="startQuiz('MEDICINA')" class="p-6 border rounded-xl hover:border-blue-500">
Medicina
</button>

<button onclick="startQuiz('ODONTOLOGIA')" class="p-6 border rounded-xl hover:border-blue-500">
Odontología
</button>

<button onclick="startQuiz('ENFERMERIA')" class="p-6 border rounded-xl hover:border-blue-500">
Enfermería
</button>

</div>

</section>


<!-- QUIZ -->

<section id="quiz" class="hidden">

<div class="flex justify-between mb-4">

<span id="careerName"></span>

<span>⏱ <span id="timer">08:00</span></span>

</div>

<div class="w-full bg-gray-200 h-2 rounded mb-6">
<div id="progress" class="bg-blue-600 h-2 rounded" style="width:0%"></div>
</div>

<div class="bg-white p-6 rounded shadow">

<p class="text-sm text-gray-500">
Pregunta <span id="qnum"></span>
</p>

<h3 id="question" class="text-lg font-semibold mt-2 mb-4"></h3>

<div id="options" class="space-y-2"></div>

</div>

<button id="nextBtn" onclick="nextQuestion()" class="mt-4 bg-blue-600 text-white px-6 py-2 rounded hidden">
Siguiente
</button>

</section>


<!-- RESULTADOS -->

<section id="results" class="hidden text-center">

<h2 class="text-2xl font-bold">
Resultados
</h2>

<div id="score" class="text-5xl font-bold text-blue-600 my-4"></div>

<p id="resultText"></p>

<div id="alertBox" class="bg-red-100 text-red-600 p-4 rounded mt-4 hidden">
⚠️ Tu nivel está por debajo del promedio de aprobación.
</div>

<a id="waBtn" target="_blank"
class="block mt-6 bg-green-500 text-white py-4 rounded-xl font-bold">

Escribir al WhatsApp

</a>

<div id="feedback" class="text-left mt-8"></div>

</section>


<!-- ADMIN -->

<section id="admin" class="hidden">

<h2 class="text-xl font-bold mb-4">
Subir preguntas CSV
</h2>

<input type="file" id="csvFile" accept=".csv" class="mb-4">

<button onclick="loadCSV()" class="bg-blue-600 text-white px-4 py-2 rounded">
Cargar preguntas
</button>

</section>

</main>


<script>

let studentName=""
let studentLast=""

let questions=[]
let quiz=[]
let index=0
let score=0
let answers=[]
let timer
let time=480


function showView(v){

["landing","student","career","quiz","results","admin"].forEach(id=>{
document.getElementById(id).classList.add("hidden")
})

document.getElementById(v).classList.remove("hidden")

}


function goCareer(){

studentName=document.getElementById("nombre").value
studentLast=document.getElementById("apellido").value

if(studentName==""||studentLast==""){
alert("Por favor ingresa tu nombre y apellido")
return
}

showView("career")

}


function startQuiz(c){

quiz=questions.filter(q=>q.carrera==c)

quiz=quiz.sort(()=>Math.random()-0.5)

quiz=quiz.slice(0,Math.min(10,quiz.length))

index=0
score=0
answers=[]
time=480

document.getElementById("careerName").innerText=c

showView("quiz")

startTimer()

loadQuestion()

}


function startTimer(){

timer=setInterval(()=>{

time--

let m=Math.floor(time/60)
let s=time%60

document.getElementById("timer").innerText=
`${m}:${s.toString().padStart(2,'0')}`

if(time<=0){

clearInterval(timer)
finishQuiz()

}

},1000)

}


function loadQuestion(){

if(!quiz[index]){
finishQuiz()
return
}

let q=quiz[index]

document.getElementById("qnum").innerText=index+1

document.getElementById("question").innerText=q.pregunta

let opt=document.getElementById("options")

opt.innerHTML=""

q.opciones.forEach(o=>{

let b=document.createElement("button")

b.className="block w-full border p-3 rounded hover:bg-blue-50"

b.innerText=o

b.onclick=()=>select(o)

opt.appendChild(b)

})

document.getElementById("progress").style.width=
((index)/quiz.length*100)+"%"

}


function select(o){

let q=quiz[index]

answers.push({

pregunta:q.pregunta,
user:o,
correct:q.respuesta,
feedback:q.feedback,
biblio:q.bibliografia

})

if(o==q.respuesta)score++

document.getElementById("nextBtn").classList.remove("hidden")

}


function nextQuestion(){

index++

document.getElementById("nextBtn").classList.add("hidden")

if(index>=quiz.length){

finishQuiz()
return

}

loadQuestion()

}


function finishQuiz(){

clearInterval(timer)

showView("results")

let percent = quiz.length ? Math.round(score/quiz.length*100) : 0

document.getElementById("score").innerText=percent+"%"

if(percent<79){

document.getElementById("alertBox").classList.remove("hidden")

document.getElementById("resultText").innerText=
"Tu nivel está por debajo del promedio."

}

let msg=`Hola soy ${studentName} ${studentLast}. Mi nota en el simulador fue ${percent}% y quiero información del curso.`

document.getElementById("waBtn").href=
"https://wa.me/593998591941?text="+encodeURIComponent(msg)

}


function adminLogin(){

let pass=prompt("Contraseña de administrador")

if(pass=="admin123"){
showView("admin")
}

}


function loadCSV(){

let file=document.getElementById("csvFile").files[0]

if(!file){
alert("Selecciona un archivo CSV")
return
}

let reader=new FileReader()

reader.onload=function(e){

let text=e.target.result.trim()

let rows=text.split("\n")

questions=[]

rows.slice(1).forEach(r=>{

let c=r.split(",")

if(c.length>=9){

questions.push({

carrera:c[0].trim().toUpperCase(),
pregunta:c[4].trim(),
respuesta:c[5].trim(),
opciones:c[6].replace(/"/g,"").split(";"),
feedback:c[7].trim(),
bibliografia:c[8].trim()

})

}

})

alert("Preguntas cargadas: "+questions.length)

}

reader.readAsText(file)

}
</script>

</body>
</html>
